# Decap CMS configuration
# Docs: https://decapcms.org/docs/

backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: public/images
public_folder: /images

# All site content is stored in JSON files, one per language.
# The client edits these through this CMS UI — no code required.
collections:
  - name: site_content
    label: Site Content
    files:

      # ─── Spanish (default) ────────────────────────────────────────────────
      - name: home_es
        label: "Home Page — Spanish (ES)"
        file: src/content/home/es.json
        fields:
          - label: Navigation
            name: nav
            widget: object
            fields:
              - { label: "Approach link label", name: approach, widget: string }
              - { label: "Contact link label", name: contact, widget: string }

          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Headline, name: headline, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
              - { label: Body text, name: body, widget: text }
              - { label: Button text, name: ctaText, widget: string }
              - { label: Button URL, name: ctaUrl, widget: string }

          - label: Video
            name: video
            widget: object
            fields:
              - { label: "Video embed URL (YouTube/Vimeo)", name: url, widget: string }

          - label: Our Approach section
            name: approach
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Intro paragraph, name: intro, widget: text }
              - label: Pillars
                name: pillars
                widget: list
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Body, name: body, widget: text }
              - { label: Photo, name: image, widget: image }
              - { label: Photo alt text, name: imageAlt, widget: string }

          - label: Testimonials
            name: testimonials
            widget: list
            fields:
              - { label: Quote, name: quote, widget: text }
              - { label: Name, name: authorName, widget: string }
              - { label: Role, name: authorRole, widget: string }

          - label: Contact section
            name: contact
            widget: object
            fields:
              - { label: Heading, name: heading, widget: string }
              - { label: Body text, name: body, widget: text }
              - { label: Form heading, name: formHeading, widget: string }
              - { label: Form intro text, name: formBody, widget: text }
              - { label: Name field label, name: labelName, widget: string }
              - { label: Organisation field label, name: labelOrg, widget: string }
              - { label: Email field label, name: labelEmail, widget: string }
              - { label: Message field label, name: labelMessage, widget: string }
              - { label: Submit button text, name: submitText, widget: string }
              - { label: Contact email, name: email, widget: string }
              - { label: Phone number, name: phone, widget: string }
              - { label: LinkedIn URL, name: linkedinUrl, widget: string }
              - { label: Workshops label, name: labelWorkshops, widget: string }
              - { label: Direct contact label, name: labelDirect, widget: string }
              - { label: LinkedIn label, name: labelLinkedin, widget: string }

          - label: Footer
            name: footer
            widget: object
            fields:
              - { label: Marquee text, name: marqueeText, widget: string }
              - { label: Copyright notice, name: copyright, widget: string }

